apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-apps
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://gitlab.devops-db.internal/infrastructure/argocd/argocd-applications.git
    targetRevision: HEAD
    path: applications/prod
    directory:
      recurse: true

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true