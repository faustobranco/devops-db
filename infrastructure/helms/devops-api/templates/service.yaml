apiVersion: v1
kind: Service
metadata:
  name: {{  printf "%s-%s" .Release.Name .Chart.Name  }}
  labels:
    app: {{ .Chart.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.internalPort }}
  selector:
    app: {{ .Chart.Name }}