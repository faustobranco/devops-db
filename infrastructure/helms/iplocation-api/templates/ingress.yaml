apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{  printf "%s-%s" .Release.Name .Chart.Name  }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{  printf "%s-%s" .Release.Name .Chart.Name  }}
                port:
                  number: {{ .Values.service.port }}

