{{- if .Values.gateway.enabled }}

{{- $base := .Chart.Name }}

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: http      
  hostnames:
    - {{ .Values.gateway.host | quote }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name:  {{ printf "%s-stable" $base }}
          port: {{ .Values.service.port }}
          weight: {{ .Values.traffic.stable }}
        - name: {{ printf "%s-canary" $base }}
          port: {{ .Values.service.port }}
          weight: {{ .Values.traffic.canary }}

{{- end }}

