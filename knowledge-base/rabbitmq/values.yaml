ingress:
  enabled: true
  ingressClassName: nginx
  hostname: rabbitmq.devops-db.internal
  path: /
  pathType: Prefix
  annotations:
    # Ensure backend-protocol is removed or explicitly set to "HTTP"
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: "step-ca-issuer"
  tls: true
  
global:
  security:
    allowInsecureImages: true

image:
  registry: public.ecr.aws
  repository: bitnami/rabbitmq
  tag: 3.13.7-debian-12-r0

auth:
  username: admin
  password: J4VPegzqSKC6Syji9ga6w1JDcTRgrvDQ
  erlangCookie: secretcookie

replicaCount: 1

management:
  enabled: true

service:
  type: NodePort
  nodePorts:
    amqp: 31572

persistence:
  enabled: true
  size: 8Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

rabbitmq:
  extraPlugins: "rabbitmq_management"